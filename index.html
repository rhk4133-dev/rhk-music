<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournament Leaderboard</title>
<style>
  /* Basic Reset */
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
  body { background: #121212; color: #fff; padding: 10px; }

  h1 { text-align: center; margin-bottom: 20px; }

  /* Leaderboard Table */
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px; text-align: center; border-bottom: 1px solid #444; }
  th { background: #1f1f1f; }
  tr:nth-child(even) { background: #1a1a1a; }

  /* Responsive Images */
  .player-img { width: 50px; height: 50px; object-fit: cover; border-radius: 50%; }

  /* MVP Highlight */
  .mvp { background: gold; color: #000; font-weight: bold; }

  /* Cheat Highlight */
  .cheat { background: red; color: #fff; font-weight: bold; }

  /* Scrollable Table on Mobile */
  @media (max-width: 600px) {
    table, thead, tbody, th, td, tr { display: block; }
    th { position: sticky; top: 0; background: #1f1f1f; }
    td { text-align: right; padding-left: 50%; position: relative; }
    td::before { 
      content: attr(data-label); 
      position: absolute; left: 10px; top: 10px; font-weight: bold; 
    }
  }
</style>
</head>
<body>

<h1>Tournament Leaderboard</h1>

<table id="leaderboard">
  <thead>
    <tr>
      <th>Rank</th>
      <th>Player</th>
      <th>Photo</th>
      <th>Match 1</th>
      <th>Match 2</th>
      <th>Total</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody>
    <!-- Players will be added dynamically -->
  </tbody>
</table>

<script>
  // Player Data
  const players = [
    { name: "Player1", img: "https://via.placeholder.com/50", match1: 5, match2: 3, status: "mvp" },
    { name: "Player2", img: "https://via.placeholder.com/50", match1: 2, match2: 4, status: "" },
    { name: "Player3", img: "https://via.placeholder.com/50", match1: 1, match2: 0, status: "cheat" },
    { name: "Player4", img: "https://via.placeholder.com/50", match1: 3, match2: 2, status: "" }
  ];

  const tbody = document.querySelector("#leaderboard tbody");

  function updateLeaderboard() {
    tbody.innerHTML = "";
    // Calculate total points
    players.forEach(p => p.total = p.match1 + p.match2);
    // Sort by total points
    players.sort((a,b) => b.total - a.total);
    
    players.forEach((player, index) => {
      const tr = document.createElement("tr");
      if(player.status === "mvp") tr.classList.add("mvp");
      if(player.status === "cheat") tr.classList.add("cheat");

      tr.innerHTML = `
        <td data-label="Rank">${index + 1}</td>
        <td data-label="Player">${player.name}</td>
        <td data-label="Photo"><img class="player-img" src="${player.img}" alt="${player.name}"></td>
        <td data-label="Match 1">${player.match1}</td>
        <td data-label="Match 2">${player.match2}</td>
        <td data-label="Total">${player.total}</td>
        <td data-label="Status">${player.status.toUpperCase()}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  updateLeaderboard();
</script>

</body>
</html>
