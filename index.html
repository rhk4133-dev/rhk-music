<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divine Esports Tournament</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">🏆 Divine Esports Tournament</h1>

<!-- MVP Card -->
<div class="mvp-card">
  <div class="crown">👑</div>
  <h2>MVP Player</h2>
  <p id="mvpName">Player: Shadow</p>
  <p id="mvpTeam">Team: RHK GAMING</p>
  <p id="mvpKills">Kills: 12</p>
</div>

<!-- Leaderboard -->
<h2>📊 Leaderboard</h2>
<table id="leaderboard">
  <tr>
    <th>Rank</th>
    <th>Team</th>
    <th>Total Kills</th>
  </tr>
  <!-- Google Sheet will populate rows -->
</table>
<p id="updateText">Updated leaderboard will publish after Match 3</p>

<!-- Match Progress Bar -->
<div class="progress-bar">
  <div class="progress" id="progress" style="width:16.66%;"></div>
  <div class="progress-labels">
    <span>Match 1</span>
    <span>Match 2</span>
    <span>Match 3</span>
    <span>Match 4</span>
    <span>Match 5</span>
    <span>Match 6</span>
  </div>
</div>

<!-- Match Buttons -->
<h2>🎮 Match Results</h2>
<div class="match-buttons">
  <button onclick="showMatch(1)">Match 1</button>
  <button onclick="showMatch(2)">Match 2</button>
  <button onclick="showMatch(3)">Match 3</button>
  <button onclick="showMatch(4)">Match 4</button>
  <button onclick="showMatch(5)">Match 5</button>
  <button onclick="showMatch(6)">Match 6</button>
</div>

<div class="match-image">
  <img id="matchImg" src="match1.png" alt="Match Result">
</div>

<!-- Teams Grid (logos placeholders) -->
<h2>👥 Teams</h2>
<div class="teams">
  <div class="team"><img src="team1.png"><p>Team 1</p></div>
  <div class="team"><img src="team2.png"><p>Team 2</p></div>
  <div class="team"><img src="team3.png"><p>Team 3</p></div>
  <div class="team"><img src="team4.png"><p>Team 4</p></div>
  <div class="team"><img src="team5.png"><p>Team 5</p></div>
  <div class="team"><img src="team6.png"><p>Team 6</p></div>
</div>

<script src="script.js"></script>
</body>

</html>
