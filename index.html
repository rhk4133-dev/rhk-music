<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Divine Esports Tournament</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="intro">
<h1>DIVINE ESPORTS</h1>
<p>Live Tournament Updates</p>
</div>


<div id="main">

<h1 class="title">Tournament Leaderboard</h1>


<div class="mvp-card">

<h2>🏆 MVP PLAYER</h2>

<p id="mvpName"></p>
<p id="mvpTeam"></p>
<p id="mvpKills"></p>

</div>


<h2>📊 Leaderboard</h2>

<table id="leaderboard">

<tr>
<th>Team</th>
<th>Kills</th>
</tr>

</table>


<h2>🎮 Match Results</h2>

<div class="match-buttons">

<button onclick="showMatch(1)">Match 1</button>
<button onclick="showMatch(2)">Match 2</button>
<button onclick="showMatch(3)">Match 3</button>
<button onclick="showMatch(4)">Match 4</button>
<button onclick="showMatch(5)">Match 5</button>
<button onclick="showMatch(6)">Match 6</button>

</div>


<div class="match-image">

<img id="matchImg" src="match1.png">

</div>

</div>

<script src="script.js"></script>

</body>
</html>
