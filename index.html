<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divine Esports Tournament</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1 class="title">🏆 Tournament Leaderboard</h1>

<div class="mvp">

<h2>🏆 MVP Player</h2>

<p id="mvpName"></p>
<p id="mvpTeam"></p>
<p id="mvpKills"></p>

</div>


<h2>📊 Leaderboard</h2>

<table id="leaderboard">

<tr>
<th>Team</th>
<th>Total Kills</th>
</tr>

</table>

<p id="updateText"></p>


<h2>🎮 Match Results</h2>

<div class="matches">

<button onclick="showMatch(1)">Match 1</button>
<button onclick="showMatch(2)">Match 2</button>
<button onclick="showMatch(3)">Match 3</button>
<button onclick="showMatch(4)">Match 4</button>
<button onclick="showMatch(5)">Match 5</button>
<button onclick="showMatch(6)">Match 6</button>

</div>


<img id="matchImg" src="match1.png">

<script src="script.js"></script>

</body>

</html>
