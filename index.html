<!DOCTYPE html>
<html>

<head>

<body>

<div class="overlay">

<div class="stats">

<div class="box">

<p>Teams</p>
</div>

<h2 id="totalKills">0</h2>
<p>Total Kills</p>
</div>

<div class="box">
<h2>6</h2>

</div>

</div>

<thead>

<tr>

<th>Team</th>

</tr>

</thead>

</table>

<table id="playerBoard">

<thead>

<tr>

<th>#</th>
<th>Player</th>
<th>Team</th>
<th>M1</th>

<th>M3</th>
<th>M4</th>
<th>M5</th>

</tr>

</thead>

</table>

</div>
